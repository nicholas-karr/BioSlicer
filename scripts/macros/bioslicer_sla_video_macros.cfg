# BioSlicer SLA video macro templates for Kalico/Klipper.
#
# MainsailOS Pi 4 defaults:
#   scripts: /home/pi/BioSlicer/scripts
#   host:    127.0.0.1
#   port:    5555
#   service: bioslicer-image-display.service
#
# Assumes shell_command is enabled and display service is available.

[gcode_shell_command BIOSLICER_SLA_CMD]
command: /usr/bin/python3 /home/pi/BioSlicer/scripts/send-image.py 127.0.0.1 5555 --service-name bioslicer-image-display.service "{params}"
timeout: 120.0
verbose: True

[gcode_macro BIOSLICER_SLA_LOAD_JOB_VIDEOS]
description: Parse current G-code for embedded/ref videos and load all videos into the decode registry.
gcode:
    {% set gcode_path = params.GCODE_PATH|default(printer.virtual_sdcard.file_path) %}
    {% set payload = '{"type":"LOAD_VIDEOS_FROM_GCODE","gcode_path":"' ~ gcode_path ~ '"}' %}
    RUN_SHELL_COMMAND CMD=BIOSLICER_SLA_CMD PARAMS="{payload}"

[gcode_macro BIOSLICER_SLA_LOAD_VIDEO]
description: Load one external video path by short alias.
gcode:
    {% set name = params.NAME|string %}
    {% set path = params.PATH|string %}
    {% set payload = '{"type":"LOAD_VIDEO","name":"' ~ name ~ '","path":"' ~ path ~ '"}' %}
    RUN_SHELL_COMMAND CMD=BIOSLICER_SLA_CMD PARAMS="{payload}"

[gcode_macro BIOSLICER_SLA_SHOW_FRAME]
description: Display one frame on the projector from a loaded alias.
gcode:
    {% set name = params.NAME|string %}
    {% set frame = params.FRAME|int %}
    {% set payload = '{"type":"SHOW_VIDEO_FRAME","name":"' ~ name ~ '","frame":' ~ frame ~ '}' %}
    RUN_SHELL_COMMAND CMD=BIOSLICER_SLA_CMD PARAMS="{payload}"

[gcode_macro BIOSLICER_SLA_CLEAR]
description: Clear projector output.
gcode:
    RUN_SHELL_COMMAND CMD=BIOSLICER_SLA_CMD PARAMS='{"type":"CLEAR"}'

[gcode_macro BIOSLICER_SLA_TOOLCHANGE]
description: Example hook called from toolchange G-code for SLA tools.
gcode:
    {% set name = params.NAME|string %}
    {% set frame = params.FRAME|int %}
    # Add machine-specific moves/exposure sequencing here.
    BIOSLICER_SLA_SHOW_FRAME NAME={name} FRAME={frame}
