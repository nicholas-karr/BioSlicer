# BioSlicer SLA video macro templates for Kalico/Klipper.
#
# MainsailOS Pi 4 defaults:
#   scripts: /home/pi/BioSlicer/scripts
#   host:    127.0.0.1
#   port:    5555
#   service: bioslicer-image-display.service
#
# Assumes shell_command is enabled and display service is available.
#
# User-facing commands:
#   BIOSLICER_INFO                                           — show params and override syntax
#   BIOSLICER_OVERRIDE PARAM=<name> EXTRUDER=<n> VALUE=<v>  — set one override
#   BIOSLICER_CLEAR_OVERRIDE PARAM=<name> [EXTRUDER=<n>]    — clear one override
#   BIOSLICER_CLEAR_ALL_OVERRIDES                            — reset everything

## ===========================================================================
## SLA video display
## ===========================================================================

[gcode_shell_command BIOSLICER_SLA_CMD]
command: /usr/bin/python3 /home/pi/BioSlicer/scripts/send-image.py 127.0.0.1 5555 --service-name bioslicer-image-display.service "{params}"
timeout: 120.0
verbose: True

[gcode_macro BIOSLICER_SLA_LOAD_JOB_VIDEOS]
description: Parse current G-code for embedded/ref videos and load all videos into the decode registry.
gcode:
    {% set gcode_path = params.GCODE_PATH|default(printer.virtual_sdcard.file_path) %}
    {% set payload = '{"type":"LOAD_VIDEOS_FROM_GCODE","gcode_path":"' ~ gcode_path ~ '"}' %}
    RUN_SHELL_COMMAND CMD=BIOSLICER_SLA_CMD PARAMS="{payload}"

[gcode_macro BIOSLICER_SLA_LOAD_VIDEO]
description: Load one external video path by short alias.
gcode:
    {% set name = params.NAME|string %}
    {% set path = params.PATH|string %}
    {% set payload = '{"type":"LOAD_VIDEO","name":"' ~ name ~ '","path":"' ~ path ~ '"}' %}
    RUN_SHELL_COMMAND CMD=BIOSLICER_SLA_CMD PARAMS="{payload}"

[gcode_macro BIOSLICER_SLA_SHOW_FRAME]
description: Display one frame on the projector from a loaded alias.
gcode:
    {% set name = params.NAME|string %}
    {% set frame = params.FRAME|int %}
    {% set payload = '{"type":"SHOW_VIDEO_FRAME","name":"' ~ name ~ '","frame":' ~ frame ~ '}' %}
    RUN_SHELL_COMMAND CMD=BIOSLICER_SLA_CMD PARAMS="{payload}"

[gcode_macro BIOSLICER_SLA_CLEAR]
description: Clear projector output.
gcode:
    RUN_SHELL_COMMAND CMD=BIOSLICER_SLA_CMD PARAMS='{"type":"CLEAR"}'

[gcode_macro BIOSLICER_SLA_TOOLCHANGE]
description: Example hook called from toolchange G-code for SLA tools.
gcode:
    {% set name = params.NAME|string %}
    {% set frame = params.FRAME|int %}
    # Add machine-specific moves/exposure sequencing here.
    BIOSLICER_SLA_SHOW_FRAME NAME={name} FRAME={frame}

## ===========================================================================
## Process parameters — sliced values + runtime overrides
## ===========================================================================

## ---------------------------------------------------------------------------
## BIOSLICER_PROCESS_PARAMS  (internal variable store — do not call directly)
## ---------------------------------------------------------------------------
## Sliced values are written by the GCode file at print start.
## Override dicts are keyed by extruder index (int); {} means no overrides.
## Bed temperature overrides use -1 as the "no override" sentinel.
[gcode_macro BIOSLICER_PROCESS_PARAMS]
# Sliced values (written by GCode)
variable_sla_exposure:         {}
variable_sla_delay_before:     {}
variable_sla_delay_after:      {}
variable_fff_first_layer_temp: {}
variable_fff_temp:             {}
variable_bed_first_layer_temp: 0
variable_bed_temp:             0
# Overrides (set via BIOSLICER_OVERRIDE before printing)
variable_override_sla_exposure:         {}
variable_override_sla_delay_before:     {}
variable_override_sla_delay_after:      {}
variable_override_fff_first_layer_temp: {}
variable_override_fff_temp:             {}
variable_override_bed_first_layer_temp: -1
variable_override_bed_temp:             -1
gcode:
  # Variable container — no body needed.


## ---------------------------------------------------------------------------
## BIOSLICER_INFO
## ---------------------------------------------------------------------------
## Print current sliced values, any active overrides, and the override syntax.
## Run this before a print to confirm what parameters will be used.
##
## Example output:
##   === BioSlicer Process Parameters ===
##     ext 4 (SLA):  exposure=5.0s  delay_before=3.0s  delay_after=0.0s
##     ext 4 (SLA):  exposure=5.0s->7.0s[OVR]  ...
##     ext 0 (FFF):  first_layer_temp=215C  temp=200C
##     bed:  first_layer_temp=60C  temp=55C
[gcode_macro BIOSLICER_INFO]
description: Show current BioSlicer process parameters and active overrides.
gcode:
  {% set m = printer["gcode_macro BIOSLICER_PROCESS_PARAMS"] %}
  { action_respond_info("=== BioSlicer Process Parameters ===") }

  ## SLA extruders
  {% if m.sla_exposure %}
    {% for ext, sliced_exp in m.sla_exposure.items() %}
      {% set ns = namespace(line="  ext " ~ ext ~ " (SLA):") %}
      {% if ext in m.override_sla_exposure %}
        {% set ns.line = ns.line ~ "  exposure=" ~ sliced_exp ~ "s->" ~ m.override_sla_exposure[ext] ~ "s[OVR]" %}
      {% else %}
        {% set ns.line = ns.line ~ "  exposure=" ~ sliced_exp ~ "s" %}
      {% endif %}
      {% if ext in m.sla_delay_before %}
        {% if ext in m.override_sla_delay_before %}
          {% set ns.line = ns.line ~ "  delay_before=" ~ m.sla_delay_before[ext] ~ "s->" ~ m.override_sla_delay_before[ext] ~ "s[OVR]" %}
        {% else %}
          {% set ns.line = ns.line ~ "  delay_before=" ~ m.sla_delay_before[ext] ~ "s" %}
        {% endif %}
      {% endif %}
      {% if ext in m.sla_delay_after %}
        {% if ext in m.override_sla_delay_after %}
          {% set ns.line = ns.line ~ "  delay_after=" ~ m.sla_delay_after[ext] ~ "s->" ~ m.override_sla_delay_after[ext] ~ "s[OVR]" %}
        {% else %}
          {% set ns.line = ns.line ~ "  delay_after=" ~ m.sla_delay_after[ext] ~ "s" %}
        {% endif %}
      {% endif %}
      { action_respond_info(ns.line) }
    {% endfor %}
  {% else %}
    { action_respond_info("  (no SLA extruders — start a print first to load parameters)") }
  {% endif %}

  ## FFF extruders
  {% if m.fff_temp %}
    {% for ext, sliced_t in m.fff_temp.items() %}
      {% set ns = namespace(line="  ext " ~ ext ~ " (FFF):") %}
      {% if ext in m.fff_first_layer_temp %}
        {% if ext in m.override_fff_first_layer_temp %}
          {% set ns.line = ns.line ~ "  first_layer_temp=" ~ (m.fff_first_layer_temp[ext] | int) ~ "C->" ~ (m.override_fff_first_layer_temp[ext] | int) ~ "C[OVR]" %}
        {% else %}
          {% set ns.line = ns.line ~ "  first_layer_temp=" ~ (m.fff_first_layer_temp[ext] | int) ~ "C" %}
        {% endif %}
      {% endif %}
      {% if ext in m.override_fff_temp %}
        {% set ns.line = ns.line ~ "  temp=" ~ (sliced_t | int) ~ "C->" ~ (m.override_fff_temp[ext] | int) ~ "C[OVR]" %}
      {% else %}
        {% set ns.line = ns.line ~ "  temp=" ~ (sliced_t | int) ~ "C" %}
      {% endif %}
      { action_respond_info(ns.line) }
    {% endfor %}
  {% else %}
    { action_respond_info("  (no FFF extruders — start a print first to load parameters)") }
  {% endif %}

  ## Bed
  {% set ns = namespace(line="  bed:") %}
  {% if m.override_bed_first_layer_temp >= 0 %}
    {% set ns.line = ns.line ~ "  first_layer_temp=" ~ (m.bed_first_layer_temp | int) ~ "C->" ~ (m.override_bed_first_layer_temp | int) ~ "C[OVR]" %}
  {% else %}
    {% set ns.line = ns.line ~ "  first_layer_temp=" ~ (m.bed_first_layer_temp | int) ~ "C" %}
  {% endif %}
  {% if m.override_bed_temp >= 0 %}
    {% set ns.line = ns.line ~ "  temp=" ~ (m.bed_temp | int) ~ "C->" ~ (m.override_bed_temp | int) ~ "C[OVR]" %}
  {% else %}
    {% set ns.line = ns.line ~ "  temp=" ~ (m.bed_temp | int) ~ "C" %}
  {% endif %}
  { action_respond_info(ns.line) }

  ## Override syntax reminder
  { action_respond_info("--- To override a parameter ---") }
  { action_respond_info("BIOSLICER_OVERRIDE PARAM=<name> EXTRUDER=<n> VALUE=<v>") }
  { action_respond_info("BIOSLICER_CLEAR_OVERRIDE PARAM=<name> [EXTRUDER=<n>]") }
  { action_respond_info("BIOSLICER_CLEAR_ALL_OVERRIDES") }
  { action_respond_info("--- Available PARAM names ---") }
  { action_respond_info("  sla_exposure  sla_delay_before  sla_delay_after   (EXTRUDER required)") }
  { action_respond_info("  fff_first_layer_temp  fff_temp                    (EXTRUDER required)") }
  { action_respond_info("  bed_first_layer_temp  bed_temp                    (no EXTRUDER needed)") }


## ---------------------------------------------------------------------------
## BIOSLICER_OVERRIDE
## ---------------------------------------------------------------------------
## Set a single process parameter override before (or at the start of) a print.
##
## Usage:
##   BIOSLICER_OVERRIDE PARAM=sla_exposure EXTRUDER=4 VALUE=7.0
##   BIOSLICER_OVERRIDE PARAM=sla_delay_before EXTRUDER=4 VALUE=2.5
##   BIOSLICER_OVERRIDE PARAM=fff_first_layer_temp EXTRUDER=0 VALUE=220
##   BIOSLICER_OVERRIDE PARAM=bed_first_layer_temp VALUE=65
##
## PARAM names:  sla_exposure  sla_delay_before  sla_delay_after
##               fff_first_layer_temp  fff_temp
##               bed_first_layer_temp  bed_temp
## EXTRUDER is required for per-extruder params, omit for bed params.
[gcode_macro BIOSLICER_OVERRIDE]
description: Override one BioSlicer process parameter. BIOSLICER_OVERRIDE PARAM=sla_exposure EXTRUDER=4 VALUE=7.0
gcode:
  {% set m          = printer["gcode_macro BIOSLICER_PROCESS_PARAMS"] %}
  {% set param_name = "override_" ~ params.PARAM %}
  {% set current    = m[param_name] %}

  {% if current is mapping %}
    ## Per-extruder dict param — update just the one key.
    {% set ext = params.EXTRUDER | int %}
    {% set val = params.VALUE | float %}
    ## Rebuild compact dict string (no spaces — Klipper GCode parser is space-delimited).
    {% set ns = namespace(s="{" ~ ext ~ ":" ~ val) %}
    {% for k, v in current.items() %}
      {% if k != ext %}
        {% set ns.s = ns.s ~ "," ~ k ~ ":" ~ v %}
      {% endif %}
    {% endfor %}
    {% set ns.s = ns.s ~ "}" %}
    SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE={ param_name } VALUE={ ns.s }
  {% else %}
    ## Scalar param (bed temperatures).
    SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE={ param_name } VALUE={ params.VALUE | int }
  {% endif %}


## ---------------------------------------------------------------------------
## BIOSLICER_CLEAR_OVERRIDE
## ---------------------------------------------------------------------------
## Remove an override so the sliced value is used again.
##
## Usage:
##   BIOSLICER_CLEAR_OVERRIDE PARAM=sla_exposure EXTRUDER=4   # clear one extruder
##   BIOSLICER_CLEAR_OVERRIDE PARAM=sla_exposure              # clear all extruders
##   BIOSLICER_CLEAR_OVERRIDE PARAM=bed_first_layer_temp      # clear bed override
[gcode_macro BIOSLICER_CLEAR_OVERRIDE]
description: Clear a BioSlicer process parameter override. BIOSLICER_CLEAR_OVERRIDE PARAM=sla_exposure EXTRUDER=4
gcode:
  {% set m          = printer["gcode_macro BIOSLICER_PROCESS_PARAMS"] %}
  {% set param_name = "override_" ~ params.PARAM %}
  {% set current    = m[param_name] %}

  {% if current is mapping %}
    {% if 'EXTRUDER' in params %}
      ## Remove only the specified extruder key.
      {% set ext = params.EXTRUDER | int %}
      {% set ns = namespace(s="{", first=true) %}
      {% for k, v in current.items() %}
        {% if k != ext %}
          {% if not ns.first %}{% set ns.s = ns.s ~ "," %}{% endif %}
          {% set ns.s = ns.s ~ k ~ ":" ~ v %}
          {% set ns.first = false %}
        {% endif %}
      {% endfor %}
      {% set ns.s = ns.s ~ "}" %}
      SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE={ param_name } VALUE={ ns.s }
    {% else %}
      ## No EXTRUDER specified — clear all overrides for this param.
      {% set empty = "{}" %}
      SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE={ param_name } VALUE={ empty }
    {% endif %}
  {% else %}
    ## Scalar param — reset to sentinel.
    SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE={ param_name } VALUE=-1
  {% endif %}


## ---------------------------------------------------------------------------
## BIOSLICER_CLEAR_ALL_OVERRIDES
## ---------------------------------------------------------------------------
## Reset every override to "no override". Run this after a print if you set
## any overrides during that session.
[gcode_macro BIOSLICER_CLEAR_ALL_OVERRIDES]
description: Clear all BioSlicer process parameter overrides.
gcode:
  {% set e = "{}" %}
  SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE=override_sla_exposure         VALUE={ e }
  SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE=override_sla_delay_before     VALUE={ e }
  SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE=override_sla_delay_after      VALUE={ e }
  SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE=override_fff_first_layer_temp VALUE={ e }
  SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE=override_fff_temp             VALUE={ e }
  SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE=override_bed_first_layer_temp VALUE=-1
  SET_GCODE_VARIABLE MACRO=BIOSLICER_PROCESS_PARAMS VARIABLE=override_bed_temp             VALUE=-1


## ---------------------------------------------------------------------------
## BIOSLICER_CHECK_PROCESS_OVERRIDES  (called automatically by GCode)
## ---------------------------------------------------------------------------
## Logs a warning for every active override that differs from the sliced value.
[gcode_macro BIOSLICER_CHECK_PROCESS_OVERRIDES]
gcode:
  {% set m = printer["gcode_macro BIOSLICER_PROCESS_PARAMS"] %}

  {% for p in ["sla_exposure", "sla_delay_before", "sla_delay_after"] %}
    {% for ext, oval in m["override_" ~ p].items() %}
      {% if ext in m[p] and oval != m[p][ext] %}
        { action_respond_info("BIOSLICER PROCESS OVERRIDE: extruder %s %s: sliced=%g -> override=%g" % (ext, p, m[p][ext], oval)) }
      {% endif %}
    {% endfor %}
  {% endfor %}

  {% for p in ["fff_first_layer_temp", "fff_temp"] %}
    {% for ext, oval in m["override_" ~ p].items() %}
      {% if ext in m[p] and oval != m[p][ext] %}
        { action_respond_info("BIOSLICER PROCESS OVERRIDE: extruder %s %s: sliced=%d -> override=%d" % (ext, p, m[p][ext] | int, oval | int)) }
      {% endif %}
    {% endfor %}
  {% endfor %}

  {% if m.override_bed_first_layer_temp >= 0 and m.override_bed_first_layer_temp != m.bed_first_layer_temp %}
    { action_respond_info("BIOSLICER PROCESS OVERRIDE: bed_first_layer_temp: sliced=%d -> override=%d" % (m.bed_first_layer_temp, m.override_bed_first_layer_temp | int)) }
  {% endif %}

  {% if m.override_bed_temp >= 0 and m.override_bed_temp != m.bed_temp %}
    { action_respond_info("BIOSLICER PROCESS OVERRIDE: bed_temp: sliced=%d -> override=%d" % (m.bed_temp, m.override_bed_temp | int)) }
  {% endif %}


## ---------------------------------------------------------------------------
## BIOSLICER_SLA_EXPOSE  (called automatically by GCode)
## ---------------------------------------------------------------------------
## Executes one SLA frame exposure using runtime-overridable timing.
## Replaces the hardcoded G4 dwell commands BioSlicer would otherwise emit.
[gcode_macro BIOSLICER_SLA_EXPOSE]
gcode:
  {% set ext = params.EXTRUDER | int %}
  {% set m   = printer["gcode_macro BIOSLICER_PROCESS_PARAMS"] %}

  {% set exposure  = m.override_sla_exposure[ext]     if ext in m.override_sla_exposure     else m.sla_exposure[ext] %}
  {% set delay_bef = m.override_sla_delay_before[ext] if ext in m.override_sla_delay_before else m.sla_delay_before[ext] %}
  {% set delay_aft = m.override_sla_delay_after[ext]  if ext in m.override_sla_delay_after  else m.sla_delay_after[ext] %}

  {% if delay_bef > 0 %}
  G4 P{ (delay_bef * 1000) | int }
  {% endif %}
  BIOSLICER_SLA_SHOW_FRAME NAME={ params.NAME } FRAME={ params.FRAME }
  {% if exposure > 0 %}
  G4 P{ (exposure * 1000) | int }
  {% endif %}
  {% if delay_aft > 0 %}
  G4 P{ (delay_aft * 1000) | int }
  {% endif %}
