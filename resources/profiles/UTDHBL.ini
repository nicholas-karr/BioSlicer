# UTD HBL (Hybrid Bioprinting Lab) vendor bundle.
# Covers BioTrident 250 and Printess printers.

[vendor]
repo_id = non-prusa-fff
config_update_url =
name = UTD HBL
config_version = 1.0.0

# ===========================================================================
# BioTrident 250
# ===========================================================================

[printer_model:BioTrident_250]
name = BioTrident 250
variants = 8ch
technology = FFF
family = BioTrident
bed_model = printbed-bioslicer.stl
bed_texture = bedtexture-bioslicer.png
thumbnail = BioTrident_250_thumbnail.png
default_materials = Basic PLA @BIOSLICERTRIDENT

[printer:*8ch*]
nozzle_diameter = 0.4,0.4,0.4,0.4,0.4,0.4,0.4,0.4
max_layer_height = 0.3
min_layer_height = 0.0375
retract_lift_above = 0.2
printer_variant = 8ch
default_print_profile = 0.20mm QUALITY BioTrident 8ch

[printer:*common_bioslicer_trident*]
printer_technology = FFF
gcode_flavor = klipper
autoemit_temperature_commands = 0
bed_shape = 77x79,177x79,177x134,77x134
max_print_height = 250
extruder_colour = #FF6B35;#4ECDC4;#45B7D1;#96CEB4;#9B59B6;#8E44AD;#6C3483;#A569BD
default_filament_profile = Basic PLA @BIOSLICERTRIDENT;Basic PLA @BIOSLICERTRIDENT;Basic PLA @BIOSLICERTRIDENT;Basic PLA @BIOSLICERTRIDENT;Standard Photopolymer Resin @BIOSLICERTRIDENT;GelMA 10% @BIOSLICERTRIDENT;PEGDA 20% @BIOSLICERTRIDENT;Alginate-GelMA Bioink @BIOSLICERTRIDENT
silent_mode = 0
printer_settings_id =
extruders_count = 8
extruder_offset = 0x0
sla_material_extruder = 0,0,0,0,1,1,1,1
sla_material_exposure_time = 0,0,0,0,5,5,5,5
sla_material_delay_before_exposure = 0,0,0,0,3,3,3,3
sla_material_delay_after_exposure = 0,0,0,0,0,0,0,0
channel_type = fff;fff;fff;fff;sla;sla;sla;sla
channel_label = FFF Nozzle 1 (0.4mm);FFF Nozzle 2 (0.4mm);FFF Nozzle 3 (0.4mm);FFF Nozzle 4 (0.4mm);SLA Bucket 1;SLA Bucket 2;SLA Bucket 3;SLA Bucket 4
sla_material_video_synthesize = 0,0,0,0,1,1,1,1
sla_material_video_names =
sla_material_video_paths =
sla_material_video_embed = 0,0,0,0,1,1,1,1
sla_material_video_synth_width = 2160
sla_material_video_synth_height = 2160
sla_material_video_synth_proj_width = 100
sla_material_video_synth_proj_height = 100
extruder_clearance_height = 20
extruder_clearance_radius = 70
default_print_profile = 0.20mm QUALITY BioTrident 8ch
thumbnails = 32x32,400x300
thumbnails_format = PNG
start_gcode = SET_PRINT_STATS_INFO TOTAL_LAYER=[total_layer_count]\nPRINT_START MATERIALS=[materials]
end_gcode = PRINT_END\n; total layers count = [total_layer_count]
layer_gcode = SET_PRINT_STATS_INFO CURRENT_LAYER={layer_num + 1}

[printer:BioTrident 250 - 8 Channel]
inherits = *common_bioslicer_trident*; *8ch*
printer_model = BioTrident_250
default_print_profile = 0.20mm QUALITY BioTrident 8ch

[print:0.20mm QUALITY BioTrident 8ch]
layer_height = 0.2
first_layer_height = 0.2
perimeters = 3
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 15%
compatible_printers_condition = printer_model=~/.*BioTrident_250.*/ and printer_variant=~/^8ch$/ and nozzle_diameter[0]==0.4

[print:0.01mm DROPLET BioTrident 8ch]
layer_height = 0.01
first_layer_height = 0.01
extrusion_width = 0.01
external_perimeter_extrusion_width = 0.01
perimeter_extrusion_width = 0.01
infill_extrusion_width = 0.01
solid_infill_extrusion_width = 0.01
top_infill_extrusion_width = 0.01
first_layer_extrusion_width = 0.01
perimeters = 1
top_solid_layers = 0
bottom_solid_layers = 0
fill_density = 0%
compatible_printers_condition = printer_model=~/.*BioTrident_250.*/ and printer_variant=~/^8ch$/ and nozzle_diameter[0]==0.4

[filament:Basic PLA @BIOSLICERTRIDENT]
filament_vendor = Generic
filament_type = PLA
filament_diameter = 1.75
temperature = 205
first_layer_temperature = 210
bed_temperature = 55
first_layer_bed_temperature = 55
compatible_printers_condition = printer_model=~/.*BioTrident_250.*/ and channel_type[0]=~/^fff$/

[filament:PCL BioInk @BIOSLICERTRIDENT]
filament_vendor = BioSlicer
filament_type = PCL
filament_diameter = 1.75
temperature = 95
first_layer_temperature = 100
bed_temperature = 25
first_layer_bed_temperature = 25
filament_max_volumetric_speed = 1.0
compatible_printers_condition = printer_model=~/.*BioTrident_250.*/ and channel_type[0]=~/^fff$/

[filament:Standard Photopolymer Resin @BIOSLICERTRIDENT]
filament_vendor = BioSlicer
filament_type = Resin
filament_diameter = 1.75
temperature = 0
first_layer_temperature = 0
bed_temperature = 0
first_layer_bed_temperature = 0
compatible_printers_condition = printer_model=~/.*BioTrident_250.*/ and channel_type[0]=~/^sla$/

[filament:GelMA 10% @BIOSLICERTRIDENT]
filament_vendor = BioSlicer
filament_type = Hydrogel
filament_diameter = 1.75
temperature = 37
first_layer_temperature = 37
bed_temperature = 0
first_layer_bed_temperature = 0
filament_max_volumetric_speed = 0.5
compatible_printers_condition = printer_model=~/.*BioTrident_250.*/ and channel_type[0]=~/^sla$/

[filament:PEGDA 20% @BIOSLICERTRIDENT]
filament_vendor = BioSlicer
filament_type = Hydrogel
filament_diameter = 1.75
temperature = 22
first_layer_temperature = 22
bed_temperature = 0
first_layer_bed_temperature = 0
filament_max_volumetric_speed = 0.3
compatible_printers_condition = printer_model=~/.*BioTrident_250.*/ and channel_type[0]=~/^sla$/

[filament:Alginate-GelMA Bioink @BIOSLICERTRIDENT]
filament_vendor = BioSlicer
filament_type = Hydrogel
filament_diameter = 1.75
temperature = 37
first_layer_temperature = 37
bed_temperature = 0
first_layer_bed_temperature = 0
filament_max_volumetric_speed = 0.2
compatible_printers_condition = printer_model=~/.*BioTrident_250.*/ and channel_type[0]=~/^sla$/

# ===========================================================================
# Printess
# ===========================================================================

[printer_model:Printess_Standard]
name = Printess
variants = 2syr
technology = FFF
family = Printess
default_materials = 1mL BD Syringe @PRINTESS

[printer:*2syr*]
nozzle_diameter = 0.2,0.2
max_layer_height = 0.4
min_layer_height = 0.05
printer_variant = 2syr
default_print_profile = 0.20mm STANDARD Printess

[printer:*common_printess*]
printer_technology = FFF
gcode_flavor = marlin
autoemit_temperature_commands = 0
bed_shape = -50x-50,50x-50,50x50,-50x50
max_print_height = 100
extruder_colour = #4FC3F7
default_filament_profile = 1mL BD Syringe @PRINTESS;1mL BD Syringe @PRINTESS
silent_mode = 0
printer_settings_id =
extruders_count = 2
extruder_offset = 0x0,0x0
sla_material_extruder = 0,0
channel_type = liquid;liquid
channel_label = Syringe B (Left);Syringe C (Right)
sla_material_video_synthesize = 0
sla_material_video_names =
sla_material_video_paths =
sla_material_video_embed = 0
extruder_clearance_height = 30
extruder_clearance_radius = 30
default_print_profile = 0.20mm STANDARD Printess

[printer:Printess - 2 Syringe]
inherits = *common_printess*; *2syr*
printer_model = Printess_Standard
default_print_profile = 0.20mm STANDARD Printess

[print:0.20mm STANDARD Printess]
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
top_solid_layers = 3
bottom_solid_layers = 2
fill_density = 15%
perimeter_speed = 5
small_perimeter_speed = 3
external_perimeter_speed = 4
infill_speed = 5
solid_infill_speed = 4
top_solid_infill_speed = 3
support_material_speed = 5
support_material_interface_speed = 3
travel_speed = 5
first_layer_speed = 3
first_layer_travel_speed = 5
compatible_printers_condition = printer_model=~/.*Printess_Standard.*/ and printer_variant=~/^2syr$/

[print:0.10mm FINE Printess]
layer_height = 0.1
first_layer_height = 0.1
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 20%
perimeter_speed = 3
small_perimeter_speed = 2
external_perimeter_speed = 2
infill_speed = 4
solid_infill_speed = 3
top_solid_infill_speed = 2
support_material_speed = 3
support_material_interface_speed = 2
travel_speed = 5
first_layer_speed = 2
first_layer_travel_speed = 5
compatible_printers_condition = printer_model=~/.*Printess_Standard.*/ and printer_variant=~/^2syr$/

[print:0.01mm DROPLET Printess]
layer_height = 0.01
first_layer_height = 0.01
extrusion_width = 0.01
external_perimeter_extrusion_width = 0.01
perimeter_extrusion_width = 0.01
infill_extrusion_width = 0.01
solid_infill_extrusion_width = 0.01
top_infill_extrusion_width = 0.01
first_layer_extrusion_width = 0.01
perimeters = 1
top_solid_layers = 0
bottom_solid_layers = 0
