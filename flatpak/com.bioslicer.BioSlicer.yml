- name: BioSlicer
  buildsystem: simple
  build-commands:
  - |
    set -e
    mkdir -p build && cd build
    /app/cmake/bin/cmake ../ \
      -GNinja \
      -DCMAKE_INSTALL_PREFIX=/app \
      -DCMAKE_INSTALL_LIBDIR=/app/lib \
      -DCMAKE_PREFIX_PATH=/app/deps/usr/local \
      -DSLIC3R_PCH=OFF \
      -DSLIC3R_FHS=ON \
      -DSLIC3R_ASAN=OFF \
      -DSLIC3R_GTK=3 \
      -DSLIC3R_STATIC=ON \
      -DSLIC3R_BUILD_TESTS=ON \
      -DSLIC3R_DESKTOP_INTEGRATION=OFF \
      -DCMAKE_BUILD_TYPE=Release \
      -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=mold" \
      -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=mold"
    /app/cmake/bin/cmake --build .
    /app/cmake/bin/cmake --build . --target install > /dev/null

  post-install:
  - |
    mkdir -p /app/share/runtime/locale
    for i in $(ls /app/share/PrusaSlicer/localization)
    do
      lang=${i%[_@]*}
      mkdir -p /app/share/runtime/locale/${lang}
      mv /app/share/PrusaSlicer/localization/${i} /app/share/runtime/locale/${lang}
      ln -rs /app/share/runtime/locale/${lang}/${i} /app/share/PrusaSlicer/localization/${i}
    done
  - |
    install -Dm644 com.bioslicer.BioSlicer.metainfo.xml /app/share/metainfo/com.bioslicer.BioSlicer.metainfo.xml
    install -Dm644 resources/icons/PrusaSlicer.svg /app/share/icons/hicolor/scalable/apps/com.bioslicer.BioSlicer.svg
    install -Dm644 resources/icons/PrusaSlicer.png /app/share/icons/hicolor/256x256/apps/com.bioslicer.BioSlicer.png
    install -Dm644 com.bioslicer.BioSlicer.desktop /app/share/applications/com.bioslicer.BioSlicer.desktop
    install set-dark-theme-variant.py /app/bin
    install uses-dark-theme.py /app/bin
    install entrypoint /app/bin
    install umount /app/bin
  - |
    mkdir -p /app/share/PrusaSlicer/scripts
    install -Dm644 scripts/hybrid_3mf_utils.py /app/share/PrusaSlicer/scripts/hybrid_3mf_utils.py
    install -Dm644 scripts/gen_sla_demo_models.py /app/share/PrusaSlicer/scripts/gen_sla_demo_models.py
  - |
    mkdir -p /app/share/mime/packages/
    install -m644 -p -t /app/share/mime/packages com.bioslicer.BioSlicer.mime.xml
    update-mime-database /app/share/mime

  sources:
  - type: dir
    path: ..
    skip:
    - build
    - deps/build
    - .git
    - flatpak
    - sandboxes
    - doc

  - type: file
    path: com.bioslicer.BioSlicer.metainfo.xml

  - type: file
    path: set-dark-theme-variant.py

  - type: file
    path: uses-dark-theme.py

  - type: file
    path: entrypoint

  - type: file
    path: umount

  - type: file
    path: com.bioslicer.BioSlicer.mime.xml

  - type: shell
    commands:
    - cp src/platform/unix/PrusaSlicer.desktop ./com.bioslicer.BioSlicer.desktop
    - sed -i 's/Name=PrusaSlicer/Name=BioSlicer/g' com.bioslicer.BioSlicer.desktop
    - sed -i 's/^\(MimeType=.*\)/\1x-scheme-handler\/bioslicer;/g' com.bioslicer.BioSlicer.desktop
    - sed -i 's/Exec=prusa-slicer %F/Exec=entrypoint --single-instance-on-url %u/g' com.bioslicer.BioSlicer.desktop
    - sed -i 's/Exec=prusa-slicer/Exec=entrypoint/g' com.bioslicer.BioSlicer.desktop
    - sed -i 's/Icon=PrusaSlicer/Icon=com.bioslicer.BioSlicer/g' com.bioslicer.BioSlicer.desktop
    - sed -i 's/+UNKNOWN/+bioslicer/g' version.inc
